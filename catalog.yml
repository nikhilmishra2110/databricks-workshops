repo:
  name: databricks-workshops
  purpose: Sequential prompt-driven Databricks GenAI MLOps workshop.
  primary_audiences:
    - analysts
    - backend developers
    - data engineers
    - data scientists
    - ml engineers
    - product teams

asset_types:
  workshop_sequence:
    path: workshops/beverage-distributor-genai-mlops/
    description: Numbered end-to-end workshop folders with one-shot Genie Code prompts.
  genie_code_skills:
    path: .assistant/skills/
    description: Skills that can be copied into Databricks Genie Code Agent mode.
  backup:
    path: workshops/beverage-distributor-genai-mlops/99-backup/
    description: Fallback prompts, SQL, and notebook-style Python SDK automation when a feature or permission is unavailable.

starter_assets:
  - path: workshops/beverage-distributor-genai-mlops/
    type: workshop
  - path: workshops/beverage-distributor-genai-mlops/00-before-workshop/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/01-use-case/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/02-generate-synthetic-data/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/03-build-lakeflow-pipeline/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/04-create-metric-view/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/05-create-optimize-genie-space/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/06-business-scenarios/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/07-mlflow-genai-evaluation/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/08-create-lakebase/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/09-build-app/PROMPT.md
    type: one_shot_prompt
  - path: workshops/beverage-distributor-genai-mlops/99-backup/notebooks/00_run_all_backup.py
    type: backup_notebook
  - path: workshops/beverage-distributor-genai-mlops/99-backup/notebooks/01_create_lakehouse_assets.py
    type: backup_notebook
  - path: workshops/beverage-distributor-genai-mlops/99-backup/notebooks/02_create_mlflow_evaluation.py
    type: backup_notebook
  - path: workshops/beverage-distributor-genai-mlops/99-backup/notebooks/03_create_lakebase_with_sdk.py
    type: backup_notebook
  - path: workshops/beverage-distributor-genai-mlops/99-backup/notebooks/04_generate_app_files.py
    type: backup_notebook
  - path: .assistant/skills/lakeflow-pipeline-builder/SKILL.md
    type: genie_code_skill
  - path: .assistant/skills/metric-view-builder/SKILL.md
    type: genie_code_skill
  - path: .assistant/skills/business-scenario-synthesizer/SKILL.md
    type: genie_code_skill
  - path: .assistant/skills/databricks-app-builder/SKILL.md
    type: genie_code_skill
