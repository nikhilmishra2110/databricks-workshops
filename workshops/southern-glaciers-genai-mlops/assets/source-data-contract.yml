domain: beverage_distribution
customer_label: Southern Glaciers
data_policy: synthetic_only

entities:
  accounts:
    description: Stores, restaurants, bars, and hospitality accounts.
    grain: one row per account
    columns:
      - account_id
      - account_name
      - account_segment
      - region
      - sales_rep_id
      - license_status
      - account_since_date
  products:
    description: Beverage products available for distribution.
    grain: one row per product
    columns:
      - product_id
      - product_name
      - category
      - brand_family
      - package_size
      - unit_price
  orders:
    description: Account orders.
    grain: one row per order line
    columns:
      - order_id
      - order_date
      - account_id
      - product_id
      - quantity
      - gross_amount
      - net_amount
      - order_status
  inventory:
    description: Current inventory position by product and region.
    grain: one row per product per region per date
    columns:
      - inventory_date
      - product_id
      - region
      - on_hand_units
      - reserved_units
      - available_units
  promotions:
    description: Active and historical promotions.
    grain: one row per promotion per product and region
    columns:
      - promotion_id
      - product_id
      - region
      - start_date
      - end_date
      - discount_pct
      - promotion_type
  rep_notes:
    description: Synthetic sales rep notes used for GenAI summarization.
    grain: one row per account note
    columns:
      - note_id
      - account_id
      - note_date
      - note_text
      - note_type

quality_rules:
  - account_id must not be null
  - product_id must not be null for order and inventory rows
  - net_amount must be less than or equal to gross_amount
  - available_units must be on_hand_units minus reserved_units
  - order_status must be one of paid, pending, cancelled, returned

